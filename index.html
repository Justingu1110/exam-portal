<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小學考古題平台</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1>📚 小學考古題</h1>
      <a href="admin.html" class="admin-link">管理考卷</a>
    </div>
  </header>

  <main class="main">
    <section class="filter-card">
      <h2 class="filter-title">搜尋條件</h2>

      <div class="filter-grid">
        <div class="filter-group">
          <label for="f-grade">年級</label>
          <select id="f-grade">
            <option value="">不限</option>
            <option value="4">4年級</option>
            <option value="5">5年級</option>
            <option value="6">6年級</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-subject">科目</label>
          <select id="f-subject">
            <option value="">不限</option>
            <option value="國語">國語</option>
            <option value="數學">數學</option>
            <option value="自然">自然</option>
            <option value="社會">社會</option>
            <option value="英語">英語</option>
            <option value="生活">生活</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-semester">學期</label>
          <select id="f-semester">
            <option value="">不限</option>
            <option value="上">上學期</option>
            <option value="下">下學期</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-examtype">段考</label>
          <select id="f-examtype">
            <option value="">不限</option>
            <option value="第一次段考(期中考)">第一次段考（期中考）</option>
            <option value="第二次段考(期中考)">第二次段考（期中考）</option>
            <option value="第三次段考(期末考)">第三次段考（期末考）</option>
            <option value="第二次段考(期末考)">第二次段考（期末考）</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-publisher">出版社</label>
          <select id="f-publisher">
            <option value="">不限</option>
            <option value="康軒">康軒</option>
            <option value="翰林">翰林</option>
            <option value="南一">南一</option>
            <option value="龍騰">龍騰</option>
            <option value="何嘉仁">何嘉仁</option>
            <option value="三民">三民</option>
            <option value="佳音">佳音</option>
            <option value="泰宇">泰宇</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-county">縣市</label>
          <select id="f-county">
            <option value="">不限</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-answer">答案卷</label>
          <select id="f-answer">
            <option value="">不限</option>
            <option value="true">含答案卷</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="f-year">學年度</label>
          <select id="f-year">
            <option value="">不限</option>
          </select>
        </div>
      </div>

      <!-- 版本提示 -->
      <div class="version-hint" id="version-hint" style="display:none">
        <span id="version-hint-text"></span>
      </div>

      <div class="filter-actions">
        <button class="btn-search" id="btn-search">搜尋考卷</button>
        <button class="btn-reset" id="btn-reset">清除</button>
      </div>
    </section>

    <!-- 結果區 -->
    <section class="results-section" id="results-section" style="display:none">
      <div class="results-header">
        <span id="result-count" class="result-count"></span>
        <div class="select-actions">
          <button class="btn-select-all" id="btn-select-all">全選</button>
          <button class="btn-select-none" id="btn-select-none">取消全選</button>
        </div>
      </div>

      <div id="popup-hint" class="popup-hint">
        💡 提示：開啟多個分頁時，請允許瀏覽器的彈出視窗權限
      </div>

      <div id="exam-list" class="exam-list"></div>
    </section>

    <div id="empty-state" class="empty-state" style="display:none">
      找不到符合條件的考卷，請調整篩選條件
    </div>
  </main>

  <!-- 底部固定操作列 -->
  <div class="bottom-bar" id="bottom-bar">
    <span id="selected-count" class="selected-count">已選 0 份</span>
    <button class="btn-open" id="btn-open-pdfs">開啟選取的 PDF</button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
